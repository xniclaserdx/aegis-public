<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AEGIS Register</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            transition: background-color 0.3s, color 0.3s;
        }
        .container {
            padding: 2rem;
            border-radius: 12px;
            box-shadow: 0 8px 16px rgba(0, 0, 0, 0.2);
            max-width: 400px;
            width: 100%;
            transition: background-color 0.3s;
        }
        h1 {
            text-align: center;
            margin-bottom: 1.5rem;
            font-size: 2rem;
            color: #2563eb;
        }
        form {
            display: flex;
            flex-direction: column;
        }
        input {
            margin-bottom: 1rem;
            padding: 0.75rem;
            border: 1px solid #93c5fd;
            border-radius: 6px;
            font-size: 1rem;
        }
        button {
            background-color: #2563eb;
            color: #ffffff;
            border: none;
            padding: 0.75rem;
            border-radius: 6px;
            cursor: pointer;
            font-weight: bold;
            font-size: 1rem;
            transition: background-color 0.3s;
        }
        button:hover {
            background-color: #1d4ed8;
        }
        .message {
            text-align: center;
            margin-top: 1rem;
            font-size: 0.9rem;
        }
        a {
            color: #2563eb;
            text-decoration: none;
            transition: color 0.3s;
        }
        a:hover {
            text-decoration: underline;
        }

        /* Light mode */
        body {
            background-color: #f3f4f6;
            color: #1f2937;
        }
        .container {
            background-color: #ffffff;
        }

        /* Dark mode */
        @media (prefers-color-scheme: dark) {
            body {
                background-color: #1f2937;
                color: #dbeafe;
            }
            .container {
                background-color: #374151;
            }
            input {
                border: 1px solid #60a5fa;
                background-color: #1f2937;
                color: #dbeafe;
            }
            button {
                background-color: #60a5fa;
                color: #1f2937;
            }
            a {
                color: #dbeafe;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Register</h1>
        <form method="POST" action="{{ url_for('register') }}">
            {{ form.hidden_tag() }}  <!-- Automatically includes CSRF token -->
            <input type="email" name="email" placeholder="Email" value="{{ form.email.data }}" required>
            <input type="password" name="password" placeholder="Password" required>
            
            <!-- No need for role selection, user role is set by default -->
            <input type="hidden" name="role" value="user">  <!-- Static 'user' role -->

            <button type="submit">Sign Up</button>
        </form>
        <div class="message">
            <a href="{{ url_for('login') }}">Already have an account? Login</a>
        </div>
    </div>
</body>
</html>
