<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AEGIS IDS Simulation - Usermanagement</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: Arial, sans-serif;
        }

        body, html {
            width: 100%;
            height: 100%;
            background-color: #f3f4f6;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .container {
            display: grid;
            grid-template-areas:
                "sidebar header"
                "sidebar table";
            grid-template-columns: 1fr 3fr;
            grid-template-rows: auto 1fr;
            height: 100vh;
            width: 100%;
            background-color: #e0e7ff;
            overflow: hidden;
            box-shadow: 0 4px 10px rgba(0, 0, 0, 0.1);
        }
        .sidebar {
            grid-area: sidebar;
            background-color: #dbeafe;
            padding: 15px;
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .sidebar button {
            padding: 12px;
            font-size: 1em;
            color: #1f2937;
            background-color: #93c5fd;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            transition: background-color 0.3s;
        }

        .sidebar button:hover {
            background-color: #60a5fa;
        }

        .header {
            grid-area: header;
            background-color: #e0f2fe;
            padding: 15px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.5em;
            font-weight: bold;
            color: #1f2937;
            border-bottom: 1px solid #ccc;
        }

        .table {
            grid-area: table;
            background-color: #e0f2fe;
            overflow-x: auto;
            overflow-y: auto;
            padding: 15px;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            background-color: #93c5fd;
        }

        th, td {
            padding: 10px;
            border: 1px solid #ccc;
            color: #1f2937;
            text-align: left;
        }

        th {
            background-color: #60a5fa;
            color: white;
        }

        .selection {
            text-align: center;
        }

        .selection button {
            cursor: pointer;
            border: none;
            padding: 10px;
            transition: background-color 0.3s;
            color: #1f2937;
            background-color: #93c5fd;
        }

        .selection button:hover {
            background-color: #e0f2fe;
        }

        /* Dark mode styles */
        body.dark {
            background-color: #121212;
            color: #f3f4f6;
        }

        .dark .container {
            background-color: #1e1e1e;
        }

        .dark .sidebar {
            background-color: #1e1e1e;
        }

        .dark .sidebar button {
            background-color: #6b7280;
            color: #f3f4f6;
        }

        .dark .sidebar button:hover {
            background-color: #9ca3af;
        }

        .dark .header {
            background-color: #1e1e1e;
            color: #f3f4f6;
            border-bottom: 1px solid #6b7280;
        }

        .dark .table {
            background-color: #252525;
        }

        .dark table {
            background-color: #6b7280;
        }

        .dark th {
            background-color: #9ca3af;
            color: #1f2937;
        }

        .dark td {
            color: #f3f4f6;
        }

        .dark .selection button {
            background-color: #6b7280;
            color: #f3f4f6;
        }

        .dark .selection button:hover {
            background-color: #9ca3af;
        }
        
    </style>
</head>
<body>
<div class="container">
    <nav class="sidebar">
        <button onclick="removeUsers()">Remove Users</button>
        <button onclick="changeRole()">Change Role</button>
        <button id="toggleDarkMode">Toggle Dark Mode</button>
        <button onclick="location.href='/dashboard'">Leave Usermangement</button>
    </nav>
    <header class="header">
        User Management
    </header>
    <div class="table">
        <table>
            <thead>
                <tr>
                    <th>Username</th>
                    <th>Role</th>
                    <th>Selected</th>
                </tr>
            </thead>
            <tbody id="data">
                {% for row in data %}
                <tr>
                    <td>{{ row[0] }}</td>
                    <td>{{ row[2] }}</td>
                    <td class="selection"><input type="checkbox" class="user-checkbox" value="{{ row[0] }}"></td>
                </tr>
                {% endfor %}
            </tbody>
        </table>
    </div>
</div>
<script>
    function getSelectedUsers() {
        const checkboxes = document.querySelectorAll('.user-checkbox:checked');
        return Array.from(checkboxes).map(checkbox => checkbox.value).join(';');
    }

    function removeUsers() {
        const selectedUsers = getSelectedUsers();
        location.href = `/remove_users/${selectedUsers}`;
    }

    function changeRole() {
        const selectedUsers = getSelectedUsers();
        location.href = `/change_rank/${selectedUsers}`;
    }

    if (window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches) {
        document.body.classList.add('dark');
    }
    document.getElementById('toggleDarkMode').addEventListener('click', () => {
        document.body.classList.toggle('dark');
    });
</script>
</body>
</html>
