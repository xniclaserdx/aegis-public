<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AEGIS Login</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            transition: background-color 0.3s, color 0.3s;
        }
        .container {
            padding: 2rem;
            border-radius: 8px;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
            max-width: 400px;
            width: 100%;
            transition: background-color 0.3s;
        }
        h1 {
            text-align: center;
            margin-bottom: 1.5rem;
        }
        form {
            display: flex;
            flex-direction: column;
        }
        input {
            margin-bottom: 1rem;
            padding: 0.5rem;
            border: 1px solid #93c5fd;
            border-radius: 4px;
        }
        button {
            background-color: #93c5fd;
            color: #1f2937;
            border: none;
            padding: 0.5rem;
            border-radius: 4px;
            cursor: pointer;
            font-weight: bold;
            transition: background-color 0.3s;
        }
        button:hover {
            background-color: #60a5fa;
        }
        .message {
            text-align: center;
            margin-top: 1rem;
        }
        a {
            color: #1f2937;
            text-decoration: none;
            transition: color 0.3s;
        }
        a:hover {
            text-decoration: underline;
        }

        /* Light mode */
        body {
            background-color: #93c5fd;
            color: #1f2937;
        }
        .container {
            background-color: #dbeafe;
        }

        /* Dark mode */
        @media (prefers-color-scheme: dark) {
            body {
                background-color: #1f2937;
                color: #dbeafe;
            }
            .container {
                background-color: #374151;
            }
            input {
                border: 1px solid #60a5fa;
                background-color: #1f2937;
                color: #dbeafe;
            }
            button {
                background-color: #60a5fa;
                color: #1f2937;
            }
            a {
                color: #dbeafe;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Login</h1>
        <form method="POST" action="{{ url_for('login') }}">
            {{ form.hidden_tag() }}  <!-- Automatically includes CSRF token -->
            <input type="email" name="email" placeholder="Email" value="{{ form.email.data }}" required>
            <input type="password" name="password" placeholder="Password" required>
            <button type="submit">Login</button>
        </form>
        <div class="message">
            <a href="{{ url_for('reset_password_request') }}">Forgot Password?</a>
            <br>
            <a href="{{ url_for('register') }}">Sign Up</a>
        </div>
    </div>
</body>
</html>
