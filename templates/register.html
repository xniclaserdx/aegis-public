<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AEGIS Register</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/register.css') }}">
</head>
<body>
    <div class="container">
        <h1>Register</h1>
        <form method="POST" action="{{ url_for('register') }}">
            {{ form.hidden_tag() }}  <!-- Automatically includes CSRF token -->
            <input type="email" name="email" placeholder="Email" value="{{ form.email.data }}" required>
            <input type="password" name="password" placeholder="Password" required>
            
            <!-- No need for role selection, user role is set by default -->
            <input type="hidden" name="role" value="user">  <!-- Static 'user' role -->

            <button type="submit">Sign Up</button>
        </form>
        <div class="message">
            <a href="{{ url_for('login') }}">Already have an account? Login</a>
        </div>
    </div>
</body>
</html>
