<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sortable and Filterable Table</title>

    <!-- Link to DataTables CSS -->
    <link rel="stylesheet" type="text/css" href="https://cdn.datatables.net/1.10.21/css/jquery.dataTables.css">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/datatable.css') }}">
</head>
<body>
    <table id="data-table" class="table table-striped table-bordered" style="width:100%">
        <thead>
            <!-- First row for column headers -->
            <tr class="header-row">
                {% for col in df_last_120.columns %}
                <th>{{ col }}</th>
                {% endfor %}
            </tr>
            <!-- Second row for dropdown filters -->
            <tr>
                {% for col in df_last_120.columns %}
                <th>
                    <select class="filter-dropdown">
                        <option value="">{{ col }}</option>
                    </select>
                </th>
                {% endfor %}
            </tr>
        </thead>
        <tbody>
            {% for row in df_last_120.itertuples() %}
            <tr>
                {% for value in row[1:] %}
                <td>{{ value }}</td>
                {% endfor %}
            </tr>
            {% endfor %}
        </tbody>
    </table>
    <form action="/dashboard" method="get">
        <button type="submit">&larr; Back to Dashboard</button>
    </form>

    <!-- jQuery and DataTables JS -->
    <script src="https://code.jquery.com/jquery-3.5.1.min.js"></script>
    <script src="https://cdn.datatables.net/1.10.21/js/jquery.dataTables.min.js"></script>
    <script src="{{ url_for('static', filename='js/datatable.js') }}"></script>
</body>

</html>
