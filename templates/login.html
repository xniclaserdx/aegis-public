<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AEGIS Login</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/auth.css') }}">
</head>
<body>
    <div class="container">
        <h1>Login</h1>
        <form method="POST" action="{{ url_for('login') }}">
            {{ form.hidden_tag() }}  <!-- Automatically includes CSRF token -->
            <input type="email" name="email" placeholder="Email" value="{{ form.email.data }}" required>
            <input type="password" name="password" placeholder="Password" required>
            <button type="submit">Login</button>
        </form>
        <div class="message">
            <a href="{{ url_for('reset_password_request') }}">Forgot Password?</a>
            <br>
            <a href="{{ url_for('register') }}">Sign Up</a>
        </div>
    </div>
</body>
</html>
